<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Koło Emocji - Introsphere</title>
  <style>
    /* Reset - usuwa domyślne marginesy i paddingi, ustawia box-sizing */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body - główne tło strony z gradientem niebieskiego, biały tekst */
    body {
      font-family: 'Quicksand', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 40px 20px;
    }

    /* Container - główny kontener, centruje zawartość, max-width 1200px */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* H1 - tytuł strony z gradientowym tekstem (żółty-czerwony-zielony-niebieski) */
    h1 {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #FFD93D, #FF6B6B, #2ECC71, #1ABC9C);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Subtitle - podtytuł strony, szary tekst */
    .subtitle {
      color: #aaa;
      font-size: 1.1rem;
      margin-bottom: 20px;
    }

    /* Content Wrapper - kontener flex dla koła emocji i panelu subspektrów */
    .content-wrapper {
      display: flex;
      align-items: center;
      gap: 60px;
    }

    /* Wheel Container - kontener koła emocji, 450x450px, pozycja relative */
    .wheel-container {
      position: relative;
      width: 450px;
      height: 450px;
      flex-shrink: 0;
    }

    /* Wheel SVG - element SVG koła, obrócony o -22.5 stopnia */
    .wheel-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-22.5deg);
    }

    /* Wheel Glow - zewnętrzna poświata wokół koła (obecnie nie używana w JS) */
    .wheel-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 480px;
      height: 480px;
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
    }

    /* Wheel Segment - grupa SVG dla każdego segmentu koła, cursor pointer, animacje */
    .wheel-segment {
      cursor: pointer;
      transition: all 0.3s ease;
    }

    /* Wheel Segment Path - ścieżka SVG segmentu, biała obwódka z przezroczystością */
    .wheel-segment path {
      transition: all 0.3s ease;
      stroke: rgba(220, 36, 36, 0.2);
      stroke-width: 2;
    }

    /* Wheel Segment Hover - efekt najechania myszką, pogrubienie obwódki, rozjaśnienie */
    .wheel-segment:hover path,
    .wheel-segment.hovered path {
      stroke-width: 4;
      filter: brightness(1.2);
    }

    /* Wheel Segment Active - aktywny segment (kliknięty), najgrubsza obwódka, największe rozjaśnienie */
    .wheel-segment.active path {
      stroke-width: 5;
      filter: brightness(1.3);
    }

    /* Segment Label - tekst nazwy emocji na segmencie, biały, bold, z cieniem */
    .segment-label {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 13px;
      fill: #fff;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      pointer-events: none;
      transition: all 0.3s ease;
    }

    /* Segment Label Hover - powiększenie tekstu przy najechaniu */
    .wheel-segment:hover .segment-label,
    .wheel-segment.hovered .segment-label {
      font-size: 15px;
    }

    /* Wheel Center - środkowy okrąg koła, gradient ciemnego fioletu, cienie, border */
    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      background: radial-gradient(circle at 30% 30%, #4a4a6a 0%, #3a3a5a 30%, #1a1a2e 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 700;
      font-size: 0.9rem;
      color: #aaa;
      box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.3), inset 0 -5px 15px rgba(255,255,255,0.1);
      z-index: 50;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid rgba(255,255,255,0.1);
    }

    /* Wheel Center Hover - efekt najechania na środkowy okrąg, powiększenie */
    .wheel-center:hover {
      transform: translate(-50%, -50%) scale(1.08);
      color: #fff;
    }

    /* Wheel Center Span - tekst w środkowym okręgu */
    .wheel-center span {
      padding: 8px;
      line-height: 1.3;
    }

    /* Hover Info - tooltip z nazwą i opisem emocji przy najechaniu, ciemne tło z blur */
    .hover-info {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 160px;
      padding: 15px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      text-align: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      z-index: 60;
      pointer-events: none;
    }

    /* Hover Info Visible - stan widoczny tooltipa */
    .hover-info.visible {
      opacity: 1;
      visibility: visible;
    }

    /* Hover Info Emotion Name - nazwa emocji w tooltipie, bold, większy tekst */
    .hover-info .emotion-name {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    /* Hover Info Emotion Description - opis emocji w tooltipie, szary tekst */
    .hover-info .emotion-description {
      font-size: 0.85rem;
      color: #ccc;
      line-height: 1.4;
    }

    /* Sub-emotions Panel - panel boczny z subspektrami emocji, szkliste tło, zaokrąglone rogi */
    .sub-emotions-panel {
      width: 340px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      border-radius: 24px;
      padding: 28px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s ease;
      box-shadow: 0 15px 50px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
      max-height: 480px;
      overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Sub-emotions Panel Visible - stan widoczny panelu */
    .sub-emotions-panel.visible {
      opacity: 1;
      visibility: visible;
    }

    /* Sub-emotions Panel Scrollbar - stylowanie paska przewijania */
    .sub-emotions-panel::-webkit-scrollbar {
      width: 6px;
    }

    /* Sub-emotions Panel Scrollbar Track - tło paska przewijania */
    .sub-emotions-panel::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
    }

    /* Sub-emotions Panel Scrollbar Thumb - uchwyt paska przewijania */
    .sub-emotions-panel::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
    }

    /* Sub-emotions Panel H3 - tytuł panelu (nazwa emocji) */
    .sub-emotions-panel h3 {
      font-size: 1.5rem;
      margin-bottom: 5px;
    }

    /* Sub-emotions Panel Parent Emotion - informacja o poziomie rodzica, szary tekst z dolną obwódką */
    .sub-emotions-panel .parent-emotion {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    /* Stay on Level - przycisk opcji 'zostań na poziomie', gradient tła, zaokrąglone rogi */
    .stay-on-level {
      background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Stay on Level Hover - efekt najechania na przycisk, rozjaśnienie i przesunięcie */
    .stay-on-level:hover {
      background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.08));
      transform: translateX(-5px);
      border-color: rgba(255,255,255,0.2);
    }

    /* Stay on Level Label - etykieta 'Opcja' nad przyciskiem, mały tekst, uppercase */
    .stay-on-level-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #aaa;
      margin-bottom: 6px;
    }

    /* Stay on Level Text - tekst główny przycisku 'Zostań na poziomie [nazwa]' */
    .stay-on-level-text {
      font-weight: 600;
      font-size: 1.05rem;
      color: #fff;
    }

    /* Sub-emotions List - kontener flex listy subspektrów */
    .sub-emotions-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Sub-emotion Item - pojedynczy element subspektrum, lekko przezroczyste tło, lewa obwódka */
    .sub-emotion-item {
      background: rgba(255,255,255,0.05);
      padding: 16px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-left: 4px solid transparent;
    }

    /* Sub-emotion Item Hover - efekt najechania, rozjaśnienie i przesunięcie w prawo */
    .sub-emotion-item:hover {
      background: rgba(255,255,255,0.15);
      transform: translateX(8px);
    }

    /* Sub-emotion Item Name - nazwa subspektrum, bold */
    .sub-emotion-item .sub-emotion-name {
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 6px;
    }

    /* Sub-emotion Item Description - opis subspektrum, szary tekst */
    .sub-emotion-item .sub-emotion-description {
      font-size: 0.85rem;
      color: #bbb;
      line-height: 1.5;
    }

    /* Instructions - kontener z instrukcjami użytkowania, flex, centrowanie */
    .instructions {
      display: flex;
      gap: 30px;
      margin-top: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Instruction Item - pojedyncza instrukcja, flex z ikoną i tekstem */
    .instruction-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #888;
      font-size: 0.9rem;
    }

    /* Instruction Icon - ikona instrukcji, kwadrat z zaokrąglonymi rogami */
    .instruction-icon {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    /* Responsive - responsywność dla ekranów < 900px, zmiana układu na kolumnowy */
    @media (max-width: 900px) {
      .content-wrapper {
        flex-direction: column;
        gap: 30px;
      }

      .wheel-container {
        width: 320px;
        height: 320px;
      }

      .sub-emotions-panel {
        width: 100%;
        max-width: 400px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 Emotions Wheel</h1>
    <p class="subtitle">8 primary emotions based on Plutchik's model</p>

    <div class="instructions">
      <div class="instruction-item">
        <div class="instruction-icon">👆</div>
        <span>Hover to see description</span>
      </div>
      <div class="instruction-item">
        <div class="instruction-icon">🖱️</div>
        <span>Click to see subspectra</span>
      </div>
      <div class="instruction-item">
        <div class="instruction-icon">🎯</div>
        <span>Click center to close</span>
      </div>
    </div>

    <div class="content-wrapper">
      <div class="wheel-container">
        <svg class="wheel-svg" viewBox="0 0 400 400" id="wheelSvg">
          <!-- Segments will be generated by JavaScript -->
        </svg>
        
        <div class="wheel-center" id="wheelCenter">
          <span>Click<br>emotion</span>
        </div>

        <div class="hover-info" id="hoverInfo">
          <div class="emotion-name" id="hoverName"></div>
          <div class="emotion-description" id="hoverDesc"></div>
        </div>
      </div>

      <div class="sub-emotions-panel" id="subPanel">
        <h3 id="subPanelTitle">Subspectra</h3>
        <div class="parent-emotion" id="subPanelParent">Parent emotion</div>
        
        <div class="stay-on-level" id="stayOnLevel">
          <div class="stay-on-level-label">Option</div>
          <div class="stay-on-level-text">Stay on level <span id="levelName"></span></div>
        </div>

        <div class="sub-emotions-list" id="subEmotionsList">
          <!-- Sub-emotions will be generated by JavaScript -->
        </div>
      </div>
    </div>
  </div>

  <script>
    // Primary emotions data - ZGODNE z emotions-structure.md
    // Kolejność: joy, trust, fear, surprise, sadness, disgust, anger, anticipation
    const primaryEmotions = [
      // joy: 0° (góra)
      { id: "joy", name: "Joy", description: "Positive delight and happiness when something good happens.", wheelPosition: 0, color: "#F7DC6F", colorDark: "#F7DC6F" },
      // trust: 45°
      { id: "trust", name: "Trust", description: "Confidence and safety in others.", wheelPosition: 45, color: "#82E0AA", colorDark: "#82E0AA" },
      // fear: 90°
      { id: "fear", name: "Fear", description: "Unpleasant response to perceived threat.", wheelPosition: 90, color: "#F1948A", colorDark: "#F1948A" },
      // surprise: 135°
      { id: "surprise", name: "Surprise", description: "Reaction to the unexpected.", wheelPosition: 135, color: "#9B59B6", colorDark: "#9B59B6" },
      // sadness: 180°
      { id: "sadness", name: "Sadness", description: "Sorrow, grief, or loss.", wheelPosition: 180, color: "#5DADE2", colorDark: "#5DADE2" },
      // disgust: 225°
      { id: "disgust", name: "Disgust", description: "Aversion and revulsion.", wheelPosition: 225, color: "#AF7AC5", colorDark: "#AF7AC5" },
      // anger: 270°
      { id: "anger", name: "Anger", description: "Strong displeasure and frustration.", wheelPosition: 270, color: "#F5B041", colorDark: "#F5B041" },
      // anticipation: 315°
      { id: "anticipation", name: "Anticipation", description: "Looking forward to what comes next.", wheelPosition: 315, color: "#FFA502", colorDark: "#E69300" }
    ];

    // Sub-emotions data - ZGODNE z emotions-structure.md
    const subEmotions = {
      // --- JOY subspectra ---
      "joy": [
        { id: "serenity", name: "Serenity", description: "Calm, peaceful contentment.", color: "#F9E79F" },
        { id: "love", name: "Love", description: "Deep affection and connection.", color: "#FADBD8" },
        { id: "ecstasy", name: "Ecstasy", description: "Intense, overwhelming joy.", color: "#F7DC6F" }
      ],
      // --- TRUST subspectra ---
      "trust": [
        { id: "acceptance", name: "Acceptance", description: "Embracing reality as it is.", color: "#ABEBC6" },
        { id: "submission", name: "Submission", description: "Yielding to others' will.", color: "#A3E4D7" }
      ],
      // --- FEAR subspectra ---
      "fear": [
        { id: "terror", name: "Terror", description: "Extreme, paralyzing fear.", color: "#F1948A" },
        { id: "apprehension", name: "Apprehension", description: "Mild, lingering worry.", color: "#F5B7B1" },
        { id: "awe", name: "Awe", description: "Fear and wonder mixed together.", color: "#FADBD8" }
      ],
      // --- SURPRISE subspectra ---
      "surprise": [
        { id: "amazement", name: "Amazement", description: "Deep astonishment and wonder.", color: "#9B59B6" },
        { id: "distraction", name: "Distraction", description: "Being pulled away from focus.", color: "#BB8FCE" }
      ],
      // --- SADNESS subspectra ---
      "sadness": [
        { id: "grief", name: "Grief", description: "Intense sorrow over loss.", color: "#5DADE2" },
        { id: "pensiveness", name: "Pensiveness", description: "Gentle, thoughtful sadness.", color: "#85C1E9" },
        { id: "remorse", name: "Remorse", description: "Painful regret for wrongdoing.", color: "#AED6F1" }
      ],
      // --- DISGUST subspectra ---
      "disgust": [
        { id: "loathing", name: "Loathing", description: "Intense disgust and hatred.", color: "#AF7AC5" },
        { id: "boredom", name: "Boredom", description: "Ennui and listlessness.", color: "#C39BD3" },
        { id: "contempt", name: "Contempt", description: "Disgust and superiority mixed.", color: "#D7BDE2" }
      ],
      // --- ANGER subspectra ---
      "anger": [
        { id: "rage", name: "Rage", description: "Intense, uncontrolled anger.", color: "#F5B041" },
        { id: "annoyance", name: "Annoyance", description: "Mild irritation.", color: "#F8C471" },
        { id: "aggressiveness", name: "Aggressiveness", description: "Forceful, hostile energy.", color: "#FAD7A0" }
      ],
      // --- ANTICIPATION subspectra ---
      "anticipation": [
        { id: "interest", name: "Interest", description: "Attentiveness and curiosity.", color: "#FFA502" },
        { id: "vigilance", name: "Vigilance", description: "Alert watchfulness.", color: "#E69300" },
        { id: "optimism", name: "Optimism", description: "Hopeful confidence.", color: "#CC8400" }
      ]
    };

    let activeEmotion = null;
    let hoveredSegment = null;

    // Calculate label position - oddalone od środka
    function getLabelPosition(cx, cy, r, angle) {
      const labelR = r * 0.78;
      return {
        x: cx + labelR * Math.cos((angle - 90) * Math.PI / 180),
        y: cy + labelR * Math.sin((angle - 90) * Math.PI / 180)
      };
    }

    // Bring segment to front (for hover effect)
    function bringToFront(segment) {
      const svg = document.getElementById('wheelSvg');
      svg.appendChild(segment);
    }

    // Helper function to lighten/darken a color
    function shadeColor(color, percent) {
      // Remove # if present
      color = color.replace('#', '');
      
      // Parse RGB
      let r = parseInt(color.substring(0, 2), 16);
      let g = parseInt(color.substring(2, 4), 16);
      let b = parseInt(color.substring(4, 6), 16);
      
      // Adjust
      r = Math.max(0, Math.min(255, r + percent));
      g = Math.max(0, Math.min(255, g + percent));
      b = Math.max(0, Math.min(255, b + percent));
      
      return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
    }

    // Generate wheel segments using SVG with 3D gradients
    function generateWheel() {
      const svg = document.getElementById('wheelSvg');
      const cx = 200;
      const cy = 200;
      const outerR = 190;
      const innerR = 50;
      const segmentAngle = 360 / 8;

      // Create defs element for gradients
      const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
      svg.appendChild(defs);

      // Create gradient definitions for each emotion
      primaryEmotions.forEach((emotion, index) => {
        const gradient = document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
        gradient.setAttribute('id', `gradient-${emotion.id}`);
        gradient.setAttribute('x1', '0%');
        gradient.setAttribute('y1', '0%');
        gradient.setAttribute('x2', '100%');
        gradient.setAttribute('y2', '100%');
        
        // Use spec colors directly
        const stop1 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
        stop1.setAttribute('offset', '0%');
        stop1.setAttribute('stop-color', emotion.color);
        stop1.setAttribute('stop-opacity', '1');
        
        const stop2 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
        stop2.setAttribute('offset', '100%');
        stop2.setAttribute('stop-color', emotion.color);
        stop2.setAttribute('stop-opacity', '1');
        
        gradient.appendChild(stop1);
        gradient.appendChild(stop2);
        defs.appendChild(gradient);
      });

      primaryEmotions.forEach((emotion, index) => {
        const startAngle = emotion.wheelPosition - (segmentAngle / 2);
        const endAngle = emotion.wheelPosition + (segmentAngle / 2);

        // Create group for segment
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.classList.add('wheel-segment');
        group.dataset.id = emotion.id;

        // Full path with hole (donut slice)
        const fullPath = `M ${cx + outerR * Math.cos((startAngle - 90) * Math.PI / 180)} ${cy + outerR * Math.sin((startAngle - 90) * Math.PI / 180)} 
                          A ${outerR} ${outerR} 0 0 1 ${cx + outerR * Math.cos((endAngle - 90) * Math.PI / 180)} ${cy + outerR * Math.sin((endAngle - 90) * Math.PI / 180)}
                          L ${cx + innerR * Math.cos((endAngle - 90) * Math.PI / 180)} ${cy + innerR * Math.sin((endAngle - 90) * Math.PI / 180)}
                          A ${innerR} ${innerR} 0 0 0 ${cx + innerR * Math.cos((startAngle - 90) * Math.PI / 180)} ${cy + innerR * Math.sin((startAngle - 90) * Math.PI / 180)}
                          Z`;

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute('d', fullPath);
        path.setAttribute('fill', `url(#gradient-${emotion.id})`);

        group.appendChild(path);

        // Add label - oddalone od środka
        const labelPos = getLabelPosition(cx, cy, (outerR + innerR) / 2 + 20, emotion.wheelPosition);
        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.classList.add('segment-label');
        label.setAttribute('x', labelPos.x);
        label.setAttribute('y', labelPos.y);
        label.setAttribute('text-anchor', 'middle');
        label.setAttribute('dominant-baseline', 'middle');
        label.textContent = emotion.name;

        group.appendChild(label);

        // Event listeners
        group.addEventListener('mouseenter', (e) => {
          hoveredSegment = group;
          group.classList.add('hovered');
          bringToFront(group);
          showHoverInfo(emotion);
        });
        group.addEventListener('mouseleave', (e) => {
          hoveredSegment = null;
          group.classList.remove('hovered');
          hideHoverInfo();
        });
        group.addEventListener('click', (e) => {
          e.stopPropagation();
          selectEmotion(emotion);
        });

        svg.appendChild(group);
      });
    }

    // Show hover info
    function showHoverInfo(emotion) {
      if (activeEmotion) return;
      
      const hoverInfo = document.getElementById('hoverInfo');
      document.getElementById('hoverName').textContent = emotion.name;
      document.getElementById('hoverName').style.color = emotion.color;
      document.getElementById('hoverDesc').textContent = emotion.description;
      hoverInfo.classList.add('visible');
    }

    // Hide hover info
    function hideHoverInfo() {
      document.getElementById('hoverInfo').classList.remove('visible');
    }

    // Select emotion
    function selectEmotion(emotion) {
      // Remove active class from all segments
      document.querySelectorAll('.wheel-segment').forEach(seg => {
        seg.classList.remove('active');
      });

      // Add active class to selected segment
      const selectedSegment = document.querySelector(`[data-id="${emotion.id}"]`);
      if (selectedSegment) {
        selectedSegment.classList.add('active');
        bringToFront(selectedSegment);
      }

      activeEmotion = emotion;
      hideHoverInfo();

      // Update panel
      document.getElementById('subPanelTitle').textContent = emotion.name;
      document.getElementById('subPanelTitle').style.color = emotion.color;
      document.getElementById('subPanelParent').textContent = `Parent level: ${emotion.name}`;
      document.getElementById('levelName').textContent = emotion.name;

      // Generate sub-emotions
      const subList = document.getElementById('subEmotionsList');
      subList.innerHTML = '';

      const subs = subEmotions[emotion.id] || [];
      
      if (subs.length > 0) {
        subs.forEach(sub => {
          const item = document.createElement('div');
          item.className = 'sub-emotion-item';
          item.style.borderLeftColor = sub.color || emotion.color;
          item.innerHTML = `
            <div class="sub-emotion-name">${sub.name}</div>
            <div class="sub-emotion-description">${sub.description}</div>
          `;
          item.addEventListener('click', () => {
            alert(`Selected subspectrum: ${sub.name}\n\nIn future version: questions for ${sub.name}`);
          });
          subList.appendChild(item);
        });
      } else {
        subList.innerHTML = '<p style="color: #aaa; text-align: center;">No subspectra for this emotion</p>';
      }

      // Show panel
      document.getElementById('subPanel').classList.add('visible');
      
      // Update center
      document.getElementById('wheelCenter').innerHTML = `<span>${emotion.name}</span>`;
      document.getElementById('wheelCenter').style.border = `3px solid ${emotion.color}`;
    }

    // Close panel when clicking center
    document.getElementById('wheelCenter').addEventListener('click', () => {
      document.querySelectorAll('.wheel-segment').forEach(seg => {
        seg.classList.remove('active');
      });
      document.getElementById('subPanel').classList.remove('visible');
      document.getElementById('wheelCenter').style.border = 'none';
      activeEmotion = null;
      document.getElementById('wheelCenter').innerHTML = '<span>Click<br>emotion</span>';
    });

    // Stay on level click
    document.getElementById('stayOnLevel').addEventListener('click', () => {
      if (activeEmotion) {
        alert(`You stayed on level: ${activeEmotion.name}\n\nIn future version: questions for ${activeEmotion.name}`);
      }
    });

    // Initialize
    generateWheel();
  </script>
</body>
</html>
